<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00c4ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g opacity="0.1">
    <circle cx="400" cy="300" r="250" fill="url(#accent)"/>
  </g>
  <g transform="translate(50, 200)">
    <g transform="translate(0, 0)">
      <rect x="0" y="50" width="100" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <text x="50" y="105" text-anchor="middle" fill="#00f5ff" font-family="Arial" font-size="14">工厂</text>
      <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    </g>
    <g transform="translate(140, 0)">
      <rect x="0" y="50" width="100" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <text x="50" y="105" text-anchor="middle" fill="#00f5ff" font-family="Arial" font-size="14">品牌</text>
      <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    </g>
    <g transform="translate(280, 0)">
      <rect x="0" y="50" width="100" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <text x="50" y="105" text-anchor="middle" fill="#00f5ff" font-family="Arial" font-size="14">分销</text>
      <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    </g>
    <g transform="translate(420, 0)">
      <rect x="0" y="50" width="100" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <text x="50" y="105" text-anchor="middle" fill="#00f5ff" font-family="Arial" font-size="14">终端</text>
      <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    </g>
    <g transform="translate(560, 0)">
      <rect x="0" y="50" width="100" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <text x="50" y="105" text-anchor="middle" fill="#00f5ff" font-family="Arial" font-size="14">消费者</text>
      <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    </g>
    <path d="M100 100 L140 100" stroke="url(#accent)" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M240 100 L280 100" stroke="url(#accent)" stroke-width="2" fill="none"/>
    <path d="M380 100 L420 100" stroke="url(#accent)" stroke-width="2" fill="none"/>
    <path d="M520 100 L560 100" stroke="url(#accent)" stroke-width="2" fill="none"/>
    <polygon points="135,95 145,100 135,105" fill="url(#accent)"/>
    <polygon points="275,95 285,100 275,105" fill="url(#accent)"/>
    <polygon points="415,95 425,100 415,105" fill="url(#accent)"/>
    <polygon points="555,95 565,100 555,105" fill="url(#accent)"/>
  </g>
  <text x="400" y="450" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="24" font-weight="bold" opacity="0.8">分销管理系统</text>
  <text x="400" y="480" text-anchor="middle" fill="#8892a8" font-family="Arial" font-size="14">工厂 → 品牌 → 分销 → 终端 → 消费者</text>
</svg>