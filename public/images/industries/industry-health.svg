<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#00a8cc"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <g filter="url(#blur)" opacity="0.5">
    <circle cx="150" cy="200" r="120" fill="url(#glow)"/>
    <circle cx="650" cy="150" r="150" fill="url(#glow)"/>
    <circle cx="400" cy="450" r="180" fill="url(#glow)"/>
  </g>
  
  <g opacity="0.08">
    <line x1="0" y1="120" x2="800" y2="120" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="800" y2="480" stroke="#00d4aa" stroke-width="0.5"/>
  </g>
  
  <g transform="translate(30, 60)">
    <g transform="translate(0, 0)">
      <path d="M100 50 L120 100 L100 180 L80 100 Z" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
      <rect x="85" y="180" width="30" height="60" fill="url(#accent)" opacity="0.4"/>
      <circle cx="100" cy="80" r="8" fill="url(#accent)" filter="url(#glowFilter)"/>
      <circle cx="100" cy="110" r="5" fill="url(#accent)" opacity="0.6"/>
      <text x="100" y="270" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="13" font-weight="bold">医药</text>
    </g>
    
    <g transform="translate(180, 20)">
      <rect x="20" y="60" width="120" height="100" rx="4" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
      <rect x="30" y="80" width="40" height="60" rx="2" fill="url(#accent)" opacity="0.3"/>
      <rect x="80" y="80" width="40" height="60" rx="2" fill="url(#accent2)" opacity="0.3"/>
      <rect x="40" y="160" width="80" height="30" rx="2" fill="url(#accent)" opacity="0.5"/>
      <text x="80" y="270" text-anchor="middle" fill="#4facfe" font-family="Arial" font-size="13" font-weight="bold">制药</text>
    </g>
    
    <g transform="translate(360, 0)">
      <ellipse cx="80" cy="120" rx="60" ry="80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
      <ellipse cx="80" cy="120" rx="40" ry="55" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.5"/>
      <ellipse cx="80" cy="120" rx="25" ry="35" fill="url(#accent)" opacity="0.2"/>
      <path d="M20 180 Q80 220 140 180" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.6"/>
      <path d="M20 195 Q80 235 140 195" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.4"/>
      <text x="80" y="270" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="13" font-weight="bold">保健</text>
    </g>
    
    <g transform="translate(520, 30)">
      <circle cx="60" cy="100" r="50" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
      <circle cx="60" cy="100" r="35" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <circle cx="60" cy="100" r="20" fill="url(#accent2)" opacity="0.3"/>
      <circle cx="60" cy="100" r="10" fill="url(#accent)" filter="url(#glowFilter)"/>
      <path d="M60 150 L60 180 M40 165 L80 165" stroke="url(#accent2)" stroke-width="2" opacity="0.6"/>
      <text x="60" y="270" text-anchor="middle" fill="#4facfe" font-family="Arial" font-size="13" font-weight="bold">医疗</text>
    </g>
  </g>
  
  <g transform="translate(100, 360)">
    <g transform="translate(0, 0)">
      <rect x="0" y="40" width="80" height="60" rx="4" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
      <rect x="10" y="55" width="25" height="30" fill="url(#accent)" opacity="0.3"/>
      <rect x="45" y="55" width="25" height="30" fill="url(#accent2)" opacity="0.3"/>
      <ellipse cx="40" cy="30" rx="30" ry="15" fill="url(#accent)" opacity="0.4"/>
      <text x="40" y="130" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="12">食品</text>
    </g>
    
    <g transform="translate(120, 10)">
      <path d="M0 80 L20 20 L40 50 L60 10 L80 40 L80 90 Z" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.7"/>
      <path d="M10 70 L30 30 L50 55" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.5"/>
      <circle cx="20" cy="20" r="5" fill="url(#accent)" opacity="0.6"/>
      <circle cx="60" cy="10" r="5" fill="url(#accent2)" opacity="0.6"/>
      <text x="40" y="130" text-anchor="middle" fill="#4facfe" font-family="Arial" font-size="12">有机</text>
    </g>
    
    <g transform="translate(260, 0)">
      <ellipse cx="40" cy="60" rx="35" ry="25" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
      <ellipse cx="40" cy="55" rx="25" ry="15" fill="url(#accent)" opacity="0.3"/>
      <path d="M5 60 Q40 90 75 60" stroke="url(#accent2)" stroke-width="2" fill="none" opacity="0.6"/>
      <path d="M15 70 Q40 90 65 70" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.4"/>
      <text x="40" y="130" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="12">生鲜</text>
    </g>
    
    <g transform="translate(380, 10)">
      <rect x="10" y="30" width="60" height="70" rx="4" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.7"/>
      <rect x="20" y="50" width="40" height="40" rx="2" fill="url(#accent)" opacity="0.3"/>
      <line x1="25" y1="40" x2="55" y2="40" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
      <circle cx="30" cy="30" r="3" fill="url(#accent)"/>
      <circle cx="40" cy="25" r="3" fill="url(#accent)"/>
      <text x="40" y="130" text-anchor="middle" fill="#4facfe" font-family="Arial" font-size="12">快消</text>
    </g>
    
    <g transform="translate(500, 0)">
      <circle cx="40" cy="50" r="35" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <circle cx="40" cy="50" r="20" fill="url(#accent2)" opacity="0.3"/>
      <path d="M20 50 L30 40 L40 50 L50 40 L60 50" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.8"/>
      <path d="M20 60 L30 50 L40 60 L50 50 L60 60" stroke="url(#accent2)" stroke-width="1.5" fill="none" opacity="0.5"/>
      <text x="40" y="130" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="12">零售</text>
    </g>
  </g>
  
  <g transform="translate(0, 520)">
    <rect x="0" y="0" width="800" height="80" fill="url(#bg)" opacity="0.85"/>
    <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold">大健康行业</text>
    <text x="400" y="60" text-anchor="middle" fill="#00d4aa" font-family="Arial" font-size="16" opacity="0.9">医药 · 制药 · 保健 · 医疗 · 食品</text>
  </g>
  
  <g opacity="0.12">
    <circle cx="80" cy="80" r="2" fill="#00d4aa"/>
    <circle cx="720" cy="120" r="3" fill="#4facfe"/>
    <circle cx="200" cy="500" r="2" fill="#00d4aa"/>
    <circle cx="600" cy="480" r="3" fill="#4facfe"/>
    <circle cx="350" cy="60" r="2" fill="#ffffff"/>
    <circle cx="450" cy="550" r="2" fill="#ffffff"/>
  </g>
</svg>