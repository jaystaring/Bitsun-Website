<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#c44569"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8b500"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <g filter="url(#blur)" opacity="0.4">
    <circle cx="200" cy="150" r="150" fill="url(#glow)"/>
    <circle cx="600" cy="450" r="180" fill="url(#glow)"/>
  </g>
  
  <g opacity="0.1">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#ff6b9d" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#ff6b9d" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#ff6b9d" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#ff6b9d" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#ff6b9d" stroke-width="0.5"/>
  </g>
  
  <g transform="translate(50, 80)">
    <g transform="translate(0, 0)">
      <rect x="20" y="120" width="160" height="280" rx="4" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
      <line x1="20" y1="180" x2="180" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="240" x2="180" y2="240" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="300" x2="180" y2="300" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="360" x2="180" y2="360" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <circle cx="100" cy="150" r="15" fill="url(#accent)" opacity="0.6"/>
      <circle cx="100" cy="210" r="15" fill="url(#accent)" opacity="0.4"/>
      <circle cx="100" cy="270" r="15" fill="url(#accent)" opacity="0.3"/>
      <text x="100" y="430" text-anchor="middle" fill="#ff6b9d" font-family="Arial" font-size="14" opacity="0.8">时装</text>
    </g>
    
    <g transform="translate(200, 0)">
      <ellipse cx="100" cy="200" rx="70" ry="100" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
      <ellipse cx="100" cy="200" rx="50" ry="70" fill="none" stroke="url(#accent2)" stroke-width="1" opacity="0.5"/>
      <ellipse cx="100" cy="200" rx="30" ry="40" fill="url(#accent2)" opacity="0.3"/>
      <path d="M60 280 Q100 320 140 280" stroke="url(#accent2)" stroke-width="2" fill="none" opacity="0.6"/>
      <text x="100" y="430" text-anchor="middle" fill="#f8b500" font-family="Arial" font-size="14" opacity="0.8">鞋服</text>
    </g>
    
    <g transform="translate(380, 0)">
      <rect x="30" y="100" width="140" height="100" rx="8" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
      <circle cx="60" cy="150" r="20" fill="url(#accent)" opacity="0.5"/>
      <circle cx="100" cy="130" r="15" fill="url(#accent2)" opacity="0.5"/>
      <circle cx="140" cy="155" r="18" fill="url(#accent)" opacity="0.4"/>
      <rect x="30" y="220" width="140" height="180" rx="4" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <line x1="50" y1="260" x2="150" y2="260" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="300" x2="150" y2="300" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="340" x2="150" y2="340" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <text x="100" y="430" text-anchor="middle" fill="#ff6b9d" font-family="Arial" font-size="14" opacity="0.8">美妆</text>
    </g>
    
    <g transform="translate(560, 0)">
      <rect x="20" y="80" width="160" height="320" rx="4" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.6"/>
      <circle cx="100" cy="140" r="30" fill="url(#accent2)" opacity="0.4"/>
      <circle cx="100" cy="220" r="25" fill="url(#accent)" opacity="0.3"/>
      <circle cx="100" cy="290" r="20" fill="url(#accent2)" opacity="0.3"/>
      <circle cx="100" cy="350" r="15" fill="url(#accent)" opacity="0.2"/>
      <text x="100" y="430" text-anchor="middle" fill="#f8b500" font-family="Arial" font-size="14" opacity="0.8">配饰</text>
    </g>
  </g>
  
  <g transform="translate(0, 520)">
    <rect x="0" y="0" width="800" height="80" fill="url(#bg)" opacity="0.8"/>
    <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold">大美丽行业</text>
    <text x="400" y="60" text-anchor="middle" fill="#ff6b9d" font-family="Arial" font-size="16" opacity="0.8">时装 · 鞋服 · 美妆 · 配饰</text>
  </g>
  
  <g opacity="0.15">
    <circle cx="100" cy="100" r="3" fill="#ff6b9d"/>
    <circle cx="700" cy="150" r="3" fill="#f8b500"/>
    <circle cx="150" cy="450" r="3" fill="#ff6b9d"/>
    <circle cx="650" cy="400" r="3" fill="#f8b500"/>
    <circle cx="400" cy="80" r="2" fill="#ffffff"/>
    <circle cx="300" cy="550" r="2" fill="#ffffff"/>
    <circle cx="500" cy="520" r="2" fill="#ffffff"/>
  </g>
