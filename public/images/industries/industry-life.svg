      <line x1="30" y1="60" x2="70" y2="60" stroke="url(#accent3)" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="80" x2="70" y2="80" stroke="url(#accent3)" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="100" x2="70" y2="100" stroke="url(#accent3)" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="120" x2="70" y2="120" stroke="url(#accent3)" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="140" x2="70" y2="140" stroke="url(#accent3)" stroke-width="1" opacity="0.5"/>
      <rect x="90" y="60" width="50" height="180" rx="4" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <line x1="100" y1="80" x2="130" y2="80" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="100" x2="130" y2="100" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="120" x2="130" y2="120" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="140" x2="130" y2="140" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="160" x2="130" y2="160" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="180" x2="130" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
      <rect x="150" y="80" width="50" height="160" rx="4" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.5"/>
