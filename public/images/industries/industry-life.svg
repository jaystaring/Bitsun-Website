      <rect x="35" y="100" width="90" height="50" rx="4" fill="url(#accent)" opacity="0.3"/>
      <circle cx="80" cy="125" r="15" fill="url(#accent2)" opacity="0.5"/>
      <rect x="35" y="170" width="40" height="50" rx="2" fill="url(#accent)" opacity="0.4"/>
      <rect x="85" y="170" width="40" height="50" rx="2" fill="url(#accent3)" opacity="0.4"/>
      <line x1="55" y1="195" x2="55" y2="210" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <line x1="105" y1="195" x2="105" y2="210" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <text x="80" y="280" text-anchor="middle" fill="#a855f7" font-family="Arial" font-size="13" font-weight="bold">家居</text>
