    <circle cx="700" cy="80" r="3" fill="#f97316"/>
    <circle cx="150" cy="500" r="2" fill="#06b6d4"/>
    <circle cx="650" cy="480" r="3" fill="#a855f7"/>
    <circle cx="400" cy="50" r="2" fill="#ffffff"/>
    <circle cx="300" cy="550" r="2" fill="#f97316"/>
    <circle cx="500" cy="560" r="2" fill="#06b6d4"/>
