      <line x1="160" y1="120" x2="190" y2="120" stroke="url(#accent2)" stroke-width="1" opacity="0.4"/>
      <line x1="160" y1="140" x2="190" y2="140" stroke="url(#accent2)" stroke-width="1" opacity="0.4"/>
      <line x1="160" y1="160" x2="190" y2="160" stroke="url(#accent2)" stroke-width="1" opacity="0.4"/>
      <line x1="160" y1="180" x2="190" y2="180" stroke="url(#accent2)" stroke-width="1" opacity="0.4"/>
