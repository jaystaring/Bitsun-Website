  <g transform="translate(0, 520)">
    <rect x="0" y="0" width="800" height="80" fill="url(#bg)" opacity="0.85"/>
    <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="28" font-weight="bold">大生活行业</text>
